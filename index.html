<!DOCTYPE html>
<html>
<head>
  <title>AgriVision</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🌱 AgriVision</h2>
    <p>Overview</p>
    <p>Monitoring</p>
    <p>Crop Health</p>
  </div>

  <!-- Main -->
  <div class="main">
    <h2>Digital Twin Farm</h2>

    <div class="farm">
      <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1200&q=80">

      <div class="zone zoneA">Zone A 🌾</div>
      <div class="zone zoneB">Zone B 🌿</div>
      <div class="zone zoneC">Zone C 🌱</div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right">
    <h3>Soil Moisture</h3>
    <p id="moisture">65%</p>

    <h3>Temperature</h3>
    <p id="temp">28°C</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
